<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinFlow — Finance Dashboard</title>

  <!-- Google Fonts: Sora (display) + JetBrains Mono (numbers) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS CDN (Play CDN for class generation) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Sora', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
        }
      }
    }
  </script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- React 18 + ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

  <!-- Babel Standalone for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* ===== BASE RESET & GLOBALS ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base:    #080a0f;
      --bg-surface: #111318;
      --bg-raised:  #181c24;
      --bg-border:  #242834;
      --bg-hover:   #1e2330;
      --text-1:     #f1f5f9;
      --text-2:     #94a3b8;
      --text-3:     #64748b;
      --text-4:     #475569;
      --gold:       #f5a623;
      --gold-dim:   #c4841c;
      --gold-glow:  rgba(245,166,35,0.12);
      --emerald:    #34d399;
      --emerald-bg: rgba(52,211,153,0.10);
      --rose:       #fb7185;
      --rose-bg:    rgba(251,113,133,0.10);
      --blue:       #60a5fa;
      --blue-bg:    rgba(96,165,250,0.10);
      --purple:     #a78bfa;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg-base);
      color: var(--text-1);
      font-family: 'Sora', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg-base); }
    ::-webkit-scrollbar-thumb { background: var(--bg-border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--gold); }

    /* ===== LAYOUT ===== */
    .sidebar {
      position: fixed;
      top: 0; left: 0;
      width: 240px;
      height: 100vh;
      background: var(--bg-base);
      border-right: 1px solid var(--bg-raised);
      display: flex;
      flex-direction: column;
      padding: 28px 16px;
      z-index: 50;
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      overflow-y: auto;
    }
    .main-content {
      margin-left: 240px;
      min-height: 100vh;
      padding: 32px 36px;
    }

    /* ===== CARDS ===== */
    .card {
      background: var(--bg-surface);
      border: 1px solid var(--bg-border);
      border-radius: 16px;
    }
    .card-raised {
      background: var(--bg-raised);
      border: 1px solid var(--bg-border);
      border-radius: 16px;
    }

    /* ===== SUMMARY CARDS ===== */
    .summary-card {
      background: var(--bg-surface);
      border: 1px solid var(--bg-border);
      border-radius: 16px;
      padding: 22px 24px;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      cursor: default;
    }
    .summary-card:hover { transform: translateY(-3px); border-color: #3a4050; }
    .summary-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      opacity: 0.8;
    }
    .summary-card.gold::before  { background: linear-gradient(90deg, transparent, var(--gold), transparent); }
    .summary-card.gold:hover    { box-shadow: 0 8px 30px rgba(245,166,35,0.08); }
    .summary-card.emerald::before { background: linear-gradient(90deg, transparent, var(--emerald), transparent); }
    .summary-card.emerald:hover { box-shadow: 0 8px 30px rgba(52,211,153,0.08); }
    .summary-card.rose::before  { background: linear-gradient(90deg, transparent, var(--rose), transparent); }
    .summary-card.rose:hover    { box-shadow: 0 8px 30px rgba(251,113,133,0.08); }
    .summary-card.blue::before  { background: linear-gradient(90deg, transparent, var(--blue), transparent); }
    .summary-card.blue:hover    { box-shadow: 0 8px 30px rgba(96,165,250,0.08); }

    /* ===== NAVIGATION ===== */
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      color: var(--text-3);
      font-size: 13px;
      font-weight: 500;
      transition: all 0.18s ease;
      user-select: none;
      white-space: nowrap;
    }
    .nav-item:hover { background: var(--bg-raised); color: var(--text-2); }
    .nav-item.active { background: var(--gold-glow); color: var(--gold); }

    /* ===== BUTTONS ===== */
    .btn-primary {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--gold);
      color: #080a0f;
      border: none;
      padding: 9px 18px;
      border-radius: 10px;
      font-family: 'Sora', sans-serif;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }
    .btn-primary:hover { background: #fbbf47; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(245,166,35,0.25); }
    .btn-primary:active { transform: translateY(0); }

    .btn-ghost {
      display: inline-flex; align-items: center; gap: 6px;
      background: transparent;
      color: var(--text-2);
      border: 1px solid var(--bg-border);
      padding: 9px 16px;
      border-radius: 10px;
      font-family: 'Sora', sans-serif;
      font-weight: 500;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.18s ease;
      white-space: nowrap;
    }
    .btn-ghost:hover { background: var(--bg-raised); border-color: #3a4050; color: var(--text-1); }

    .btn-icon {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 5px;
      border-radius: 6px;
      color: var(--text-4);
      transition: all 0.15s ease;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-icon:hover { background: var(--bg-raised); color: var(--text-2); }
    .btn-icon.danger:hover { color: var(--rose); }
    .btn-icon.edit-icon:hover { color: var(--gold); }

    /* ===== FORM ELEMENTS ===== */
    .input-field {
      background: var(--bg-raised);
      border: 1px solid var(--bg-border);
      color: var(--text-1);
      padding: 9px 13px;
      border-radius: 10px;
      font-family: 'Sora', sans-serif;
      font-size: 13px;
      outline: none;
      transition: border-color 0.18s ease;
      width: 100%;
    }
    .input-field:focus { border-color: var(--gold); }
    .input-field::placeholder { color: var(--text-4); }
    .input-field option { background: var(--bg-raised); color: var(--text-1); }

    /* ===== BADGES ===== */
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 9px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }
    .badge-income  { background: var(--emerald-bg); color: var(--emerald); }
    .badge-expense { background: var(--rose-bg); color: var(--rose); }
    .badge-cat     { background: rgba(245,166,35,0.08); color: var(--gold); font-size: 10px; padding: 2px 8px; }

    /* ===== TABLE ===== */
    .tx-table-head {
      display: grid;
      grid-template-columns: 2.2fr 1.1fr 1.1fr 1fr 1fr;
      padding: 10px 20px;
      border-bottom: 1px solid var(--bg-border);
    }
    .tx-row {
      display: grid;
      grid-template-columns: 2.2fr 1.1fr 1.1fr 1fr 1fr;
      align-items: center;
      padding: 13px 20px;
      border-bottom: 1px solid #13161e;
      transition: background 0.12s ease;
    }
    .tx-row:last-child { border-bottom: none; }
    .tx-row:hover { background: #0e1116; }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      animation: fadeIn 0.18s ease;
    }
    .modal-box {
      background: var(--bg-surface);
      border: 1px solid var(--bg-border);
      border-radius: 20px;
      padding: 32px;
      width: 100%;
      max-width: 460px;
      animation: slideUp 0.25s ease;
    }

    /* ===== PROGRESS BAR ===== */
    .progress-track { height: 5px; background: var(--bg-border); border-radius: 3px; overflow: hidden; }
    .progress-fill  { height: 100%; border-radius: 3px; transition: width 0.8s ease; }

    /* ===== INSIGHT CARD ===== */
    .insight-card {
      background: var(--bg-surface);
      border: 1px solid var(--bg-border);
      border-radius: 14px;
      padding: 20px 22px;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }
    .insight-card:hover { transform: translateY(-2px); border-color: #3a4050; }

    /* ===== MOBILE TOGGLE ===== */
    .mobile-menu-btn {
      display: none;
      background: transparent;
      border: 1px solid var(--bg-border);
      border-radius: 8px;
      padding: 7px;
      cursor: pointer;
      color: var(--text-2);
    }
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 49;
    }

    /* ===== CHIPS ===== */
    .chip {
      padding: 5px 13px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--bg-border);
      background: transparent;
      color: var(--text-3);
      font-family: 'Sora', sans-serif;
      transition: all 0.18s ease;
    }
    .chip:hover, .chip.active { background: var(--gold-glow); border-color: var(--gold); color: var(--gold); }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes slideIn { from { transform: translateX(-12px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .page-enter { animation: slideIn 0.3s ease; }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      padding: 56px 20px;
      color: var(--text-4);
    }
    .empty-state .emoji { font-size: 40px; margin-bottom: 14px; display: block; }
    .empty-state .title { font-size: 15px; font-weight: 600; color: var(--text-3); margin-bottom: 4px; }
    .empty-state .sub   { font-size: 12px; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 900px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay { display: block; }
      .main-content { margin-left: 0; padding: 24px 18px; }
      .mobile-menu-btn { display: flex; }
      .tx-table-head, .tx-row { grid-template-columns: 1.6fr 1fr 1fr; }
      .tx-table-head > *:nth-child(4),
      .tx-table-head > *:nth-child(5),
      .tx-row > *:nth-child(4),
      .tx-row > *:nth-child(5) { display: none; }
      .charts-grid { grid-template-columns: 1fr !important; }
      .insights-grid { grid-template-columns: 1fr !important; }
      .cards-grid { grid-template-columns: 1fr 1fr !important; }
    }
    @media (max-width: 560px) {
      .cards-grid { grid-template-columns: 1fr !important; }
      .modal-box { padding: 22px 18px; }
      .controls-row { flex-wrap: wrap; }
    }
  </style>
</head>

/* ================================================================
   SECTION 2 — UTILITY FUNCTIONS
   ================================================================ */

const fmtINR = (amount) => {
  if (amount >= 100000) return `₹${(amount/100000).toFixed(2)}L`;
  if (amount >= 1000)   return `₹${(amount/1000).toFixed(1)}K`;
  return `₹${Math.round(amount).toLocaleString('en-IN')}`;
};

const fmtDate = (d) =>
  new Date(d).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });

const getMonthlyData = (txs) => {
  const m = {};
  txs.forEach(t => {
    const key = MONTHS_SHORT[new Date(t.date).getMonth()];
    if (!m[key]) m[key] = { income:0, expense:0 };
    m[key][t.type] += t.amount;
  });
  return m;
};

const getCatBreakdown = (txs) => {
  const c = {};
  txs.filter(t => t.type==='expense').forEach(t => { c[t.category]=(c[t.category]||0)+t.amount; });
  return c;
};

const exportCSV = (txs) => {
  const head = ['ID','Date','Description','Category','Type','Amount (INR)'];
  const rows = txs.map(t => [t.id, t.date, `"${t.description}"`, t.category, t.type, t.amount]);
  const csv  = [head, ...rows].map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type:'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = Object.assign(document.createElement('a'), { href:url, download:'finflow_transactions.csv' });
  a.click(); URL.revokeObjectURL(url);
};

const exportJSON = (txs) => {
  const blob = new Blob([JSON.stringify(txs, null, 2)], { type:'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = Object.assign(document.createElement('a'), { href:url, download:'finflow_transactions.json' });
  a.click(); URL.revokeObjectURL(url);
};

/* ================================================================
   SECTION 3 — STATE MANAGEMENT (React Context)
   ================================================================ */

const AppCtx = createContext(null);

const AppProvider = ({ children }) => {
  // Persist transactions to localStorage
  const [transactions, setTransactions] = useState(() => {
    try {
      const s = localStorage.getItem('ff_txs');
      return s ? JSON.parse(s) : SEED_TRANSACTIONS;
    } catch { return SEED_TRANSACTIONS; }
  });

  // Role: 'admin' | 'viewer'
  const [role, setRole] = useState(() => localStorage.getItem('ff_role') || 'admin');

  // Current page
  const [page, setPage] = useState('dashboard');

  // Sidebar (mobile)
  const [sidebarOpen, setSidebarOpen] = useState(false);

  // Filters & sort (Transactions page)
  const [filters, setFilters] = useState({
    search: '', type: 'all', category: 'all', month: 'all',
    sortBy: 'date', sortDir: 'desc',
  });

  // Persist
  useEffect(() => { try { localStorage.setItem('ff_txs',  JSON.stringify(transactions)); } catch {} }, [transactions]);

  // CRUD
  const addTx = useCallback((form) => {
    setTransactions(p => [{ ...form, id: Date.now(), amount: parseFloat(form.amount) }, ...p]);
  }, []);

  const updateTx = useCallback((id, form) => {
    setTransactions(p => p.map(t => t.id===id ? { ...t, ...form, amount: parseFloat(form.amount) } : t));
  }, []);

  const deleteTx = useCallback((id) => {
    setTransactions(p => p.filter(t => t.id !== id));
  }, []);

  const resetData = () => {
    if (confirm('Reset all data to defaults?')) {
      setTransactions(SEED_TRANSACTIONS);
    }
  };

  // Filtered + sorted transactions
  const filtered = useMemo(() => {
    let r = [...transactions];
    const q = filters.search.toLowerCase();
    if (q)                     r = r.filter(t => t.description.toLowerCase().includes(q) || t.category.toLowerCase().includes(q));
    if (filters.type !== 'all')     r = r.filter(t => t.type === filters.type);
    if (filters.category !== 'all') r = r.filter(t => t.category === filters.category);
    if (filters.month !== 'all')    r = r.filter(t => MONTHS_SHORT[new Date(t.date).getMonth()] === filters.month);
    r.sort((a, b) => {
      let va = a[filters.sortBy], vb = b[filters.sortBy];
      if (filters.sortBy === 'date')   { va = new Date(va); vb = new Date(vb); }
      if (filters.sortBy === 'amount') { va = +va; vb = +vb; }
      return filters.sortDir === 'asc' ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
    });
    return r;
  }, [transactions, filters]);

  // Summary stats
  const summary = useMemo(() => {
    const income  = transactions.filter(t=>t.type==='income' ).reduce((s,t)=>s+t.amount,0);
    const expense = transactions.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    return { income, expense, balance: income-expense, savingsRate: income>0 ? (income-expense)/income*100 : 0 };
  }, [transactions]);

  return (
    <AppCtx.Provider value={{
      transactions, filtered, summary,
      role, setRole,
      page, setPage,
      sidebarOpen, setSidebarOpen,
      filters, setFilters,
      addTx, updateTx, deleteTx, resetData,
    }}>
      {children}
    </AppCtx.Provider>
  );
};

const BalanceTrendChart = ({ transactions }) => {
  const ref  = useRef(null);
  const inst = useRef(null);

  useEffect(() => {
    const monthly  = getMonthlyData(transactions);
    const labels   = Object.keys(monthly);
    const incData  = labels.map(m => monthly[m].income);
    const expData  = labels.map(m => monthly[m].expense);

    if (inst.current) inst.current.destroy();

    const ctx = ref.current.getContext('2d');
    const gI  = ctx.createLinearGradient(0,0,0,260);
    gI.addColorStop(0,'rgba(52,211,153,0.28)');
    gI.addColorStop(1,'rgba(52,211,153,0)');
    const gE  = ctx.createLinearGradient(0,0,0,260);
    gE.addColorStop(0,'rgba(251,113,133,0.18)');
    gE.addColorStop(1,'rgba(251,113,133,0)');

    inst.current = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [
          { label:'Income',   data:incData, borderColor:'#34d399', backgroundColor:gI, borderWidth:2, pointBackgroundColor:'#34d399', pointRadius:4, pointHoverRadius:6, tension:0.4, fill:true },
          { label:'Expenses', data:expData, borderColor:'#fb7185', backgroundColor:gE, borderWidth:2, pointBackgroundColor:'#fb7185', pointRadius:4, pointHoverRadius:6, tension:0.4, fill:true },
        ],
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        interaction:{ intersect:false, mode:'index' },
        plugins:{
          legend:{ display:true, position:'top',
            labels:{ color:'#64748b', font:{ family:'Sora', size:11 }, boxWidth:10, boxHeight:10, padding:16 }
          },
          tooltip:{
            backgroundColor:'#1a1f2e', titleColor:'#94a3b8', bodyColor:'#f1f5f9',
            borderColor:'#2a2f3e', borderWidth:1, padding:12, cornerRadius:10,
            callbacks:{ label: c => ` ${c.dataset.label}: ₹${c.raw.toLocaleString('en-IN')}` }
          }
        },
        scales:{
          x:{ grid:{ color:'#111318', drawBorder:false }, ticks:{ color:'#475569', font:{ family:'Sora', size:11 } } },
          y:{ grid:{ color:'#111318', drawBorder:false }, ticks:{ color:'#475569', font:{ family:'JetBrains Mono', size:10 }, callback: v=>`₹${(v/1000).toFixed(0)}K` } }
        }
      }
    });

    return () => { if(inst.current) inst.current.destroy(); };
  }, [transactions]);

  return <div style={{ position:'relative', height:260 }}><canvas ref={ref} /></div>;
};

/* ================================================================
   SECTION 9 — CHART: SPENDING BREAKDOWN (Doughnut)
   ================================================================ */

const SpendingChart = ({ transactions }) => {
  const ref  = useRef(null);
  const inst = useRef(null);

  const breakdown = useMemo(() => getCatBreakdown(transactions), [transactions]);

  useEffect(() => {
    const entries = Object.entries(breakdown).sort((a,b)=>b[1]-a[1]).slice(0,7);
    const labels  = entries.map(([k])=>k);
    const values  = entries.map(([,v])=>v);
    const colors  = labels.map(l => CATEGORY_COLORS[l]||'#94a3b8');

    if (inst.current) inst.current.destroy();
    const ctx = ref.current.getContext('2d');

    inst.current = new Chart(ctx, {
      type:'doughnut',
      data:{
        labels,
        datasets:[{
          data:values,
          backgroundColor: colors.map(c => c+'99'),
          borderColor: colors,
          borderWidth:2,
          hoverOffset:8,
        }]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        cutout:'68%',
        plugins:{
          legend:{ position:'right',
            labels:{ color:'#64748b', font:{ family:'Sora', size:10 }, boxWidth:9, boxHeight:9, padding:9 }
          },
          tooltip:{
            backgroundColor:'#1a1f2e', titleColor:'#94a3b8', bodyColor:'#f1f5f9',
            borderColor:'#2a2f3e', borderWidth:1, padding:12, cornerRadius:10,
            callbacks:{
              label: c => {
                const total = values.reduce((a,b)=>a+b,0);
                return ` ₹${c.raw.toLocaleString('en-IN')} (${((c.raw/total)*100).toFixed(1)}%)`;
              }
            }
          }
        }
      }
    });

    return () => { if(inst.current) inst.current.destroy(); };
  }, [breakdown]);

  return <div style={{ position:'relative', height:220 }}><canvas ref={ref} /></div>;
};

            <input className="input-field" value={form.description} onChange={e=>set('description',e.target.value)} placeholder="e.g. Monthly Salary" />
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:11 }}>
            <div>
              <label style={{ fontSize:10, color:'var(--text-3)', textTransform:'uppercase', letterSpacing:'0.5px', display:'block', marginBottom:6 }}>Amount (₹) *</label>
              <input className="input-field" type="number" min="1" value={form.amount} onChange={e=>set('amount',e.target.value)} placeholder="0" />
            </div>
            <div>
              <label style={{ fontSize:10, color:'var(--text-3)', textTransform:'uppercase', letterSpacing:'0.5px', display:'block', marginBottom:6 }}>Date *</label>
              <input className="input-field" type="date" value={form.date} onChange={e=>set('date',e.target.value)} style={{ colorScheme:'dark' }} />
            </div>
          </div>
          <div>
            <label style={{ fontSize:10, color:'var(--text-3)', textTransform:'uppercase', letterSpacing:'0.5px', display:'block', marginBottom:6 }}>Category</label>
            <select className="input-field" value={form.category} onChange={e=>set('category',e.target.value)}>
              {cats.map(c => <option key={c} value={c}>{c}</option>)}
            </select>
          </div>
        </div>

        {/* Actions */}
        <div style={{ display:'flex', gap:10, marginTop:22 }}>
          <button className="btn-ghost" onClick={onClose} style={{ flex:1, justifyContent:'center' }}>Cancel</button>
          <button className="btn-primary" onClick={submit} style={{ flex:1, justifyContent:'center' }}>
            {isEdit ? 'Update' : 'Add Transaction'}
          </button>
        </div>
      </div>
    </div>
  );
};

/* ================================================================
   SECTION 12 — TRANSACTIONS PAGE
   ================================================================ */

const TransactionsPage = () => {
  const { role, filtered, transactions, filters, setFilters, deleteTx } = useApp();
  const [modal, setModal]     = useState(false);
  const [editTx, setEditTx]   = useState(null);
  const [exportMenu, setExportMenu] = useState(false);

  const allCats = useMemo(() => [...new Set(transactions.map(t=>t.category))].sort(), [transactions]);

  const toggleSort = (field) => {
    setFilters(f => ({
      ...f,
      sortBy:  field,
      sortDir: f.sortBy===field ? (f.sortDir==='asc' ? 'desc' : 'asc') : 'desc',
    }));
  };

  const SortArrow = ({ field }) => {
    if (filters.sortBy !== field) return <span style={{ color:'#334155', marginLeft:3 }}>↕</span>;
    return <span style={{ color:'#f5a623', marginLeft:3 }}>{filters.sortDir==='asc' ? '↑' : '↓'}</span>;
  };

  const openAdd  = () => { setEditTx(null); setModal(true); };
  const openEdit = (tx) => { setEditTx(tx); setModal(true); };

  return (
    <div className="page-enter">
      <Header title="Transactions" subtitle={`Showing ${filtered.length} of ${transactions.length} entries`} />

      {/* ── Controls ── */}
      <div className="controls-row" style={{ display:'flex', gap:10, marginBottom:18, alignItems:'center', flexWrap:'wrap' }}>
        {/* Search */}
        <div style={{ position:'relative', flex:'1 1 200px', minWidth:180 }}>
          <div style={{ position:'absolute', left:11, top:'50%', transform:'translateY(-50%)', pointerEvents:'none' }}>
            <Icon name="search" size={13} color="#475569" />
          </div>
          <input
            className="input-field"
            style={{ paddingLeft:32 }}
            placeholder="Search description or category…"
            value={filters.search}
            onChange={e => setFilters(f=>({...f,search:e.target.value}))}
          />
        </div>

        <select className="input-field" style={{ flex:'0 0 auto', width:'auto' }} value={filters.type} onChange={e=>setFilters(f=>({...f,type:e.target.value}))}>
          <option value="all">All Types</option>
          <option value="income">Income</option>
          <option value="expense">Expense</option>
        </select>

        <select className="input-field" style={{ flex:'0 0 auto', width:'auto' }} value={filters.category} onChange={e=>setFilters(f=>({...f,category:e.target.value}))}>
          <option value="all">All Categories</option>
          {allCats.map(c=><option key={c} value={c}>{c}</option>)}
        </select>

        <select className="input-field" style={{ flex:'0 0 auto', width:'auto' }} value={filters.month} onChange={e=>setFilters(f=>({...f,month:e.target.value}))}>
          <option value="all">All Months</option>
          {MONTHS_SHORT.slice(0,6).map(m=><option key={m} value={m}>{m} 2025</option>)}
        </select>

        {/* Export */}
        <div style={{ position:'relative' }}>
          <button className="btn-ghost" onClick={()=>setExportMenu(v=>!v)}>
            <Icon name="download" size={13} /> Export
          </button>
          {exportMenu && (
            <div style={{
              position:'absolute', right:0, top:'calc(100% + 6px)',
              background:'var(--bg-raised)', border:'1px solid var(--bg-border)', borderRadius:10,
              overflow:'hidden', zIndex:10, minWidth:140,
            }}>
              <div
                style={{ padding:'10px 14px', cursor:'pointer', fontSize:12, color:'var(--text-2)', transition:'background 0.15s' }}
                onMouseEnter={e=>e.target.style.background='var(--bg-hover)'}
                onMouseLeave={e=>e.target.style.background='transparent'}
                onClick={()=>{ exportCSV(filtered); setExportMenu(false); }}
              >Export as CSV</div>
              <div
                style={{ padding:'10px 14px', cursor:'pointer', fontSize:12, color:'var(--text-2)', transition:'background 0.15s' }}
                onMouseEnter={e=>e.target.style.background='var(--bg-hover)'}
                onMouseLeave={e=>e.target.style.background='transparent'}
                onClick={()=>{ exportJSON(filtered); setExportMenu(false); }}
              >Export as JSON</div>
            </div>
          )}
        </div>

        {/* Reset filters */}
        {(filters.search || filters.type!=='all' || filters.category!=='all' || filters.month!=='all') && (
          <button className="btn-ghost" onClick={()=>setFilters(f=>({...f,search:'',type:'all',category:'all',month:'all'}))}>
            Clear filters
          </button>
        )}

        {role==='admin' && (
          <button className="btn-primary" onClick={openAdd}>
            <Icon name="plus" size={13} /> Add Transaction
          </button>
        )}
      </div>

      {/* ── Table ── */}
      <div className="card" style={{ overflow:'hidden' }}>
        <div className="tx-table-head">
          {[
            { label:'Description', field:'description' },
            { label:'Date',        field:'date'        },
            { label:'Category',    field:null          },
            { label:'Amount',      field:'amount'      },
            { label:'Type / Action', field:null        },
          ].map(({ label, field }) => (
            <div
              key={label}
              onClick={() => field && toggleSort(field)}
              style={{
                fontSize:10, color:'var(--text-3)', textTransform:'uppercase', letterSpacing:'0.6px', fontWeight:600,
                cursor: field ? 'pointer' : 'default', userSelect:'none',
                display:'flex', alignItems:'center',
              }}
            >
              {label}{field && <SortArrow field={field} />}
            </div>
          ))}
        </div>

        {filtered.length === 0 ? (
          <div className="empty-state">
            <span className="emoji">💸</span>
            <div className="title">No transactions found</div>
            <div className="sub">Try adjusting your search or filters</div>
          </div>
        ) : filtered.map(tx => (
          <div key={tx.id} className="tx-row">
            {/* Description */}
            <div>
              <div style={{ fontSize:13, fontWeight:500, color:'var(--text-1)', marginBottom:2 }}>{tx.description}</div>
            </div>
            {/* Date */}
            <div style={{ fontFamily:'JetBrains Mono, monospace', fontSize:11, color:'var(--text-3)' }}>{fmtDate(tx.date)}</div>
            {/* Category */}
            <div><span className="badge badge-cat">{tx.category}</span></div>
            {/* Amount */}
            <div style={{ fontFamily:'JetBrains Mono, monospace', fontSize:13, fontWeight:600, color: tx.type==='income' ? '#34d399' : '#fb7185' }}>
              {tx.type==='income' ? '+' : '−'}₹{tx.amount.toLocaleString('en-IN')}
            </div>
            {/* Type + Actions */}
            <div style={{ display:'flex', alignItems:'center', gap:6 }}>
              <span className={`badge badge-${tx.type}`}>{tx.type}</span>
              {role==='admin' && (
                <>
                  <button className="btn-icon edit-icon" onClick={()=>openEdit(tx)} title="Edit"><Icon name="edit" size={13} /></button>
                  <button className="btn-icon danger" onClick={()=>{ if(confirm('Delete this transaction?')) deleteTx(tx.id); }} title="Delete"><Icon name="trash" size={13} /></button>
                </>
              )}
            </div>
          </div>
        ))}
      </div>

      {modal && <TxModal existing={editTx} onClose={()=>{ setModal(false); setEditTx(null); }} />}
    </div>
  );
};

/* ================================================================
   SECTION 13 — INSIGHTS PAGE
   ================================================================ */

const InsightsPage = () => {
  const { transactions } = useApp();

  const breakdown  = useMemo(() => getCatBreakdown(transactions), [transactions]);
  const monthlyRaw = useMemo(() => getMonthlyData(transactions), [transactions]);

  const monthlyArr = useMemo(() =>
    Object.entries(monthlyRaw).map(([m, d]) => ({ month:m, ...d, net:d.income-d.expense })),
  [monthlyRaw]);

  const totalExpense  = Object.values(breakdown).reduce((s,v)=>s+v, 0);
  const totalIncome   = transactions.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const sortedCats    = Object.entries(breakdown).sort((a,b)=>b[1]-a[1]);
  const topCat        = sortedCats[0];
  const bestMonth     = monthlyArr.reduce((b,m)=>m.net>b.net?m:b, monthlyArr[0]||{month:'—',net:0});
  const avgIncome     = monthlyArr.length ? monthlyArr.reduce((s,m)=>s+m.income,0)/monthlyArr.length : 0;
  const avgExpense    = monthlyArr.length ? monthlyArr.reduce((s,m)=>s+m.expense,0)/monthlyArr.length : 0;
  const maxIncome     = Math.max(...monthlyArr.map(m=>m.income), 1);

  const tip = topCat?.[0] === 'Housing'
    ? 'Housing dominates your expenses. Explore shared arrangements or negotiating rent to free up cash.'
    : `Your ${topCat?.[0]} spending is your largest outflow. Setting a monthly cap could increase your savings rate.`;

  const insightCards = [
    {
      icon:'filter', color:'#f5a623', bg:'rgba(245,166,35,0.09)',
      label:'Top Expense Category',
      value: topCat?.[0] || '—',
      sub: topCat ? `₹${topCat[1].toLocaleString('en-IN')} · ${((topCat[1]/totalExpense)*100).toFixed(1)}% of total spending` : '',
    },
    {
      icon:'trendingUp', color:'#34d399', bg:'rgba(52,211,153,0.09)',
      label:'Best Savings Month',
      value: `${bestMonth.month} 2025`,
      sub: `Net saved: ₹${bestMonth.net?.toLocaleString('en-IN') || 0}`,
    },
    {
      icon:'wallet', color:'#60a5fa', bg:'rgba(96,165,250,0.09)',
      label:'Monthly Averages',
      value: `${fmtINR(avgIncome)} in`,
      sub: `${fmtINR(avgExpense)} out  ·  ${((avgIncome-avgExpense)/avgIncome*100).toFixed(1)}% saved`,
    },
    {
      icon:'bulb', color:'#a78bfa', bg:'rgba(167,139,250,0.09)',
      label:'Smart Tip',
      value: null,
      sub: tip,
    },
  ];

  return (
    <div className="page-enter">
      <Header title="Insights" subtitle="Patterns and observations from your financial data" />

      {/* ── Insight Cards ── */}
      <div className="insights-grid" style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:14, marginBottom:22 }}>
        {insightCards.map(c => (
          <div key={c.label} className="insight-card">
            <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:12 }}>
              <div style={{ width:30, height:30, borderRadius:8, background:c.bg, display:'flex', alignItems:'center', justifyContent:'center' }}>
                <Icon name={c.icon} size={14} color={c.color} />
              </div>
              <span style={{ fontSize:10, color:'var(--text-3)', textTransform:'uppercase', letterSpacing:'0.5px', fontWeight:600 }}>{c.label}</span>
            </div>
            {c.value && (
              <div style={{ fontSize:16, fontWeight:700, color:'var(--text-1)', marginBottom:5, lineHeight:1.2 }}>{c.value}</div>
            )}
            {c.sub && (
              <div style={{ fontSize:11, color:'var(--text-4)', lineHeight:1.6 }}>{c.sub}</div>
            )}
          </div>
        ))}
      </div>

      {/* ── Monthly Breakdown + Category Ranks ── */}
      <div className="insights-grid" style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }}>

        {/* Monthly net bar */}
        <div className="card" style={{ padding:22 }}>
          <div style={{ fontSize:13, fontWeight:600, color:'var(--text-1)', marginBottom:4 }}>Monthly Performance</div>
          <div style={{ fontSize:11, color:'var(--text-4)', marginBottom:20 }}>Income, expenses and net savings per month</div>

          {monthlyArr.map(m => {
            const incPct = (m.income / maxIncome) * 100;
            const expPct = (m.expense / maxIncome) * 100;
            return (
              <div key={m.month} style={{ marginBottom:16 }}>
                <div style={{ display:'flex', justifyContent:'space-between', marginBottom:6, alignItems:'center' }}>
                  <span style={{ fontSize:12, color:'var(--text-2)', fontWeight:500 }}>{m.month}</span>
                  <div style={{ display:'flex', gap:14 }}>
                    <span style={{ fontFamily:'JetBrains Mono', fontSize:11, color:'#34d399' }}>+{fmtINR(m.income)}</span>
                    <span style={{ fontFamily:'JetBrains Mono', fontSize:11, color:'#fb7185' }}>−{fmtINR(m.expense)}</span>
                    <span style={{ fontFamily:'JetBrains Mono', fontSize:11, color: m.net>=0 ? '#34d399' : '#fb7185', fontWeight:600 }}>
                      {m.net>=0?'+':''}{fmtINR(m.net)}
                    </span>
                  </div>
                </div>
                <div style={{ display:'grid', gap:3 }}>
                  <div className="progress-track">
                    <div className="progress-fill" style={{ width:`${incPct}%`, background:'#34d399' }} />
                  </div>
                  <div className="progress-track">
                    <div className="progress-fill" style={{ width:`${expPct}%`, background:'#fb7185' }} />
                  </div>
                </div>
              </div>
            );
          })}
        </div>

        {/* Category ranks */}
        <div className="card" style={{ padding:22 }}>
          <div style={{ fontSize:13, fontWeight:600, color:'var(--text-1)', marginBottom:4 }}>Expense Category Ranking</div>
          <div style={{ fontSize:11, color:'var(--text-4)', marginBottom:20 }}>All expense categories by total spend</div>

          {sortedCats.map(([cat, amt], i) => {
            const pct = (amt / totalExpense) * 100;
            const col = CATEGORY_COLORS[cat] || '#94a3b8';
            return (
              <div key={cat} style={{ marginBottom:13 }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:5 }}>
                  <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                    <div style={{ width:6, height:6, borderRadius:2, background:col, flexShrink:0 }} />
                    <span style={{ fontSize:12, color:'var(--text-2)' }}>{cat}</span>
                    {i===0 && <span style={{ fontSize:9, background:'rgba(245,166,35,0.1)', color:'#f5a623', padding:'1px 6px', borderRadius:4, fontWeight:700 }}>TOP</span>}
                  </div>
                  <div style={{ display:'flex', gap:10, alignItems:'center' }}>
                    <span style={{ fontFamily:'JetBrains Mono', fontSize:10, color:'var(--text-4)' }}>{pct.toFixed(1)}%</span>
                    <span style={{ fontFamily:'JetBrains Mono', fontSize:11, color:'var(--text-1)', fontWeight:600 }}>₹{(amt/1000).toFixed(1)}K</span>
                  </div>
                </div>
                <div className="progress-track">
                  <div className="progress-fill" style={{ width:`${pct}%`, background:col, opacity:.75 }} />
                </div>
              </div>
            );
          })}

          {sortedCats.length===0 && (
            <div className="empty-state" style={{ padding:'24px 0' }}>
              <div className="sub">No expense data found</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

/* ================================================================
   SECTION 14 — ROOT APP
   ================================================================ */

const App = () => {
  const { page } = useApp();
  const pages = { dashboard:<DashboardPage/>, transactions:<TransactionsPage/>, insights:<InsightsPage/> };

  return (
    <div>
      <Sidebar />
      <main className="main-content">
        {pages[page] || <DashboardPage />}
      </main>
    </div>
  );
};

/* ================================================================
   SECTION 15 — MOUNT
   ================================================================ */

ReactDOM.createRoot(document.getElementById('root')).render(
  <AppProvider><App /></AppProvider>
);
</script>
</body>
</html>
